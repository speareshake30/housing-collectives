version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hc_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-hcollective}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hcollective_dev}
      POSTGRES_DB: ${DB_NAME:-housing_collectives}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hcollective}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hc_network

  # Backend API (Node.js/Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hc_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgres://${DB_USER:-hcollective}:${DB_PASSWORD:-hcollective_dev}@postgres:5432/${DB_NAME:-housing_collectives}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    networks:
      - hc_network

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hc_frontend
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-3001}
      VITE_WS_URL: ws://localhost:${WS_PORT:-3002}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    command: npm run dev -- --host
    networks:
      - hc_network

  # Redis for Sessions and Real-time features
  redis:
    image: redis:7-alpine
    container_name: hc_redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hc_network

  # Nginx Reverse Proxy (for production/local SSL)
  nginx:
    image: nginx:alpine
    container_name: hc_nginx
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - hc_network
    profiles:
      - production

  # Mailhog for development email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: hc_mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_WEB_PORT:-8025}:8025"
    networks:
      - hc_network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  hc_network:
    driver: bridge
